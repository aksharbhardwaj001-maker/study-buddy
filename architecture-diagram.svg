<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">YouTube Study Buddy — Architecture</text>

  <!-- Browser -->
  <rect x="40" y="80" width="180" height="70" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="130" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0C447C">Browser</text>
  <text x="130" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#185FA5">User interface (HTML/CSS)</text>

  <!-- Flask App -->
  <rect x="360" y="80" width="200" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="460" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#26215C">Flask Web App</text>
  <text x="460" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3C3489">app.py — routes &amp; sessions</text>
  <text x="460" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3C3489">Hosted on Alibaba Cloud ECS</text>

  <!-- Core Logic -->
  <rect x="360" y="220" width="200" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="460" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#04342C">Core Logic</text>
  <text x="460" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#085041">study_buddy.py</text>
  <text x="460" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#085041">Recap, quiz, grading, progress</text>

  <!-- Qwen / OpenRouter API -->
  <rect x="670" y="140" width="200" height="70" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
  <text x="770" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#412402">Qwen Model API</text>
  <text x="770" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#633806">via Qwen Cloud / OpenRouter</text>
  <text x="770" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#633806">Generates recap + quiz + grading</text>

  <!-- YouTube Transcript API -->
  <rect x="670" y="300" width="200" height="70" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="770" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4A1B0C">YouTube Transcript API</text>
  <text x="770" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#712B13">Fetches video captions</text>
  <text x="770" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#712B13">Used to build quiz content</text>

  <!-- Memory storage -->
  <rect x="360" y="380" width="200" height="70" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="1.5"/>
  <text x="460" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4B1528">Memory Store</text>
  <text x="460" y="423" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#72243E">video_memory.json</text>
  <text x="460" y="439" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#72243E">Per-video watch %, quiz scores</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Browser <-> Flask -->
  <line x1="220" y1="115" x2="358" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">HTTP request/response</text>

  <!-- Flask <-> Core Logic -->
  <line x1="460" y1="150" x2="460" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Core Logic <-> Qwen API -->
  <line x1="560" y1="240" x2="668" y2="185" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="630" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Prompt / JSON</text>

  <!-- Core Logic <-> YouTube API -->
  <line x1="560" y1="270" x2="668" y2="325" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="630" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Video ID</text>

  <!-- Core Logic <-> Memory -->
  <line x1="460" y1="290" x2="460" y2="378" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Read/write</text>

  <!-- Footer note -->
  <text x="450" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888" font-style="italic">MemoryAgent track — persistent per-video progress and quiz history across sessions</text>
</svg>
